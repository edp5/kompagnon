<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompagnon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
      html, body, #app {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(158, 212, 217, 0.24), transparent 28%),
          linear-gradient(160deg, #f3ede6 0%, #faf6f1 60%, rgba(72, 175, 196, 0.1) 100%);
      }

      .boot-splash {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .boot-splash__card {
        width: min(100%, 480px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 32px;
        text-align: center;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(30, 44, 56, 0.08);
        box-shadow: 0 20px 48px rgba(30, 44, 56, 0.12);
        backdrop-filter: blur(14px);
      }

      .boot-splash__logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }

      .boot-splash__title {
        margin: 0;
        font-family: "Nunito", system-ui, sans-serif;
        font-size: clamp(24px, 4vw, 32px);
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: #1e2c38;
      }

      .boot-splash__message {
        margin: 0;
        color: #5a6c7a;
      }

      .boot-splash__dots {
        display: inline-flex;
        gap: 8px;
      }

      .boot-splash__dots span {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #48afc4, #9ed4d9);
        animation: boot-pulse 1.05s ease-in-out infinite;
      }

      .boot-splash__dots span:nth-child(2) { animation-delay: 0.12s; }
      .boot-splash__dots span:nth-child(3) { animation-delay: 0.24s; }

      @keyframes boot-pulse {
        0%, 80%, 100% {
          opacity: 0.35;
          transform: scale(0.9);
        }

        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-splash" aria-hidden="true">
        <div class="boot-splash__card">
          <img src="/kompagnon-logo.png" alt="" class="boot-splash__logo">
          <h1 class="boot-splash__title">Chargement de Kompagnon</h1>
          <div class="boot-splash__dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p class="boot-splash__message">Préparation de votre espace et synchronisation sécurisée…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
